name: Build Windows Installer

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean install dependencies
        run: |
          Remove-Item -Path package-lock.json -ErrorAction SilentlyContinue
          Remove-Item -Path node_modules -Recurse -ErrorAction SilentlyContinue
          npm install
        shell: pwsh

      - name: Build frontend for Electron
        run: npx vite build --outDir dist
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Compile Electron TypeScript
        run: npx tsc -p tsconfig.electron.json

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist-installer/*.exe
            dist-installer/*.yml
          retention-days: 30

      - name: Get version from package.json
        id: pkg
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: List installer files
        run: Get-ChildItem -Path dist-installer -Filter *.exe | ForEach-Object { Write-Host $_.FullName }
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: CV Fit Check v${{ steps.pkg.outputs.version }}
          body: |
            ## CV Fit Check v${{ steps.pkg.outputs.version }}

            Download the installer below to get started.

            **Installation:** Download the `.exe` file, run it, and follow the setup wizard.
          files: dist-installer/*.exe
          draft: false
          prerelease: false
          make_latest: true
