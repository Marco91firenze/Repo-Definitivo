name: Production Pipeline
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: windows-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install
      - name: Build landing page
        run: npx vite build
        env:
          BUILD_TARGET: landing
      - name: Build Electron app
        run: npm run build:electron
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
