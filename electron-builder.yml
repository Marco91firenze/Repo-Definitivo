appId: com.cvfitcheck.desktop
productName: CV Fit Check
directories:
  buildResources: assets
  output: dist-installer
files:
  - from: dist
    to: .
    filter:
      - "**/*"
  - from: dist-electron
    to: dist-electron
    filter:
      - "**/*"
  - package.json
win:
  target:
    - nsis
    - portable
  certificateFile: null
  certificatePassword: null
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CV Fit Check
  deleteAppDataOnUninstall: false
portable:
  artifactName: CV-Fit-Check-${version}-portable.exe
